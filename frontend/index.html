<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>围棋习题集</title>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- =============== 列表视图 =============== -->
<div id="list-view">
  <header>
    <h1 class="main-title">围棋习题集</h1>
    <p class="subtitle">Tsumego Collection</p>
  </header>
  <div class="list-toolbar">
    <button id="btn-new-problem" class="start-btn">+ 新建习题</button>
  </div>
  <div id="problem-list"></div>
</div>

<!-- =============== 详情视图 =============== -->
<div id="detail-view" class="hidden">
  <div id="detail-topbar">
    <button id="btn-back-list" class="ctrl-btn">← 返回列表</button>
    <input id="problem-title" class="title-input" value="未命名习题" />
    <span id="phase-badge" class="phase-badge"></span>
    <button id="btn-save" class="ctrl-btn">保存</button>
    <button id="btn-delete" class="ctrl-btn btn-danger">删除</button>
  </div>

  <main>
    <section id="board-section">
      <div id="board-frame">
        <div id="board-container"><canvas id="board-canvas"></canvas></div>
      </div>
      <div id="move-indicator">
        <span id="move-dot" class="layout"></span>
        <span id="move-text">布局模式</span>
      </div>
    </section>

    <aside id="sidebar">
      <!-- ===== 设置阶段的卡片 ===== -->

      <!-- 布局 -->
      <div id="layout-controls" class="card hidden">
        <h3 class="section-title">① 布局</h3>
        <div id="color-selector">
          <button id="sel-black" class="tool-btn active-tool"><span class="stone-icon black-stone"></span>黑子</button>
          <button id="sel-white" class="tool-btn"><span class="stone-icon white-stone"></span>白子</button>
          <button id="sel-erase" class="tool-btn">擦除</button>
        </div>
        <button id="btn-to-region" class="start-btn">下一步：设置落子点</button>
      </div>

      <!-- 区域 -->
      <div id="region-controls" class="card hidden">
        <h3 class="section-title">② 设置落子点</h3>
        <p class="hint">点击切换可落子/墙。</p>
        <div class="btn-row">
          <button id="btn-clear-region" class="tool-btn">全部清空</button>
          <button id="btn-all-region" class="tool-btn">全部可下</button>
        </div>
        <div class="btn-row">
          <button id="btn-back-layout" class="ctrl-btn">返回布局</button>
          <button id="btn-to-target" class="start-btn">下一步：设定目标</button>
        </div>
      </div>

      <!-- 目标 -->
      <div id="target-controls" class="card hidden">
        <h3 class="section-title">③ 设定目标</h3>
        <p id="target-label" class="hint">未选目标</p>
        <p class="hint">点白子=杀(红)，点黑子=守(蓝)，再点取消</p>
        <div class="btn-row">
          <button id="btn-confirm-target" class="start-btn">确认目标</button>
        </div>
        <div class="btn-row">
          <button id="btn-back-region" class="ctrl-btn">返回落子点</button>
        </div>
      </div>

      <!-- 预处理 -->
      <div id="precompute-controls" class="card hidden">
        <h3 class="section-title">④ 预处理</h3>
        <p id="precompute-label" class="hint">预处理可加速解题（可选）</p>
        <div id="precompute-progress" class="hidden">
          <div id="precompute-stats" class="precompute-stats"></div>
        </div>
        <div class="btn-row">
          <button id="btn-precompute" class="start-btn">开始预处理</button>
          <button id="btn-stop-precompute" class="ctrl-btn hidden btn-danger">停止预处理</button>
        </div>
        <div class="btn-row">
          <button id="btn-back-target" class="ctrl-btn">返回目标</button>
          <button id="btn-finish-setup" class="start-btn">完成设置</button>
        </div>
      </div>

      <!-- ===== 解题阶段的卡片 ===== -->

      <!-- 解题控制 -->
      <div id="solve-controls" class="card hidden">
        <h3 class="section-title">解题</h3>
        <p id="solve-target-label" class="hint"></p>
        <div class="btn-row">
          <button id="btn-autoplay" class="start-btn">最优解</button>
        </div>
        <div class="btn-row">
          <button id="btn-reset-solve" class="ctrl-btn">重置</button>
        </div>
      </div>

      <!-- 决策日志 -->
      <div id="decision-log" class="card hidden">
        <h3 class="section-title">决策记录</h3>
        <div id="log-list"></div>
      </div>

      <!-- 反馈 -->
      <div id="feedback" class="card feedback-card hidden">
        <div id="feedback-icon"></div>
        <p id="feedback-message"></p>
      </div>
    </aside>
  </main>
</div>

<script src="board.js"></script>
<script src="region.js"></script>
<script src="api.js"></script>
<script src="renderer.js"></script>
<script src="app.js"></script>
</body>
</html>
